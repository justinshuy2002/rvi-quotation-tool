<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RVi Quotation Tool</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input, button { padding: 8px; margin: 5px 0; width: 100%; }
    .container { max-width: 600px; margin: auto; }
    .card { border: 1px solid #ddd; padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>RVi Quotation Tool (Cloud Version)</h2>

    <input id="clientName" placeholder="Client Name" />
    <input id="companyName" placeholder="Company" />
    <input id="amount" placeholder="Amount" />

    <button onclick="handleSave()">Save Quotation</button>
    <button onclick="loadQuotationsUI()">Load History</button>

    <div id="history"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://udzgthurdpvzithzhhot.supabase.co";
    const SUPABASE_KEY = "sb_publishable_WoyIlNfvJ3tm0w2FROOgsA_p7O8ahZU";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleSave() {
      const data = {
        client: document.getElementById("clientName").value,
        company: document.getElementById("companyName").value,
        amount: document.getElementById("amount").value,
        created_at: new Date().toISOString()
      };

      const { error } = await supabase
        .from("quotations")
        .insert([{ key: "quote_" + Date.now(), value: JSON.stringify(data) }]);

      if (error) {
        alert("❌ Error: " + error.message);
      } else {
        alert("✅ Saved online");
      }
    }

    async function loadQuotationsUI() {
      const { data, error } = await supabase
        .from("quotations")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      const container = document.getElementById("history");
      container.innerHTML = "";

      data.forEach(item => {
        const parsed = JSON.parse(item.value);

        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <strong>${parsed.client}</strong><br>
          ${parsed.company}<br>
          ${parsed.amount}
        `;

        container.appendChild(div);
      });
    }
  </script>
</body>
</html>
